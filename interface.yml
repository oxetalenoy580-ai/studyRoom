openapi: 3.0.0
info:
    title: 校园自习室预约系统
    description: 严格按角色拆分接口 | 学生接口 / 管理员接口 / 公共接口
    version: 1.0.0
servers:
    - url: http://localhost:8080
      description: 本地开发环境

components:
    securitySchemes:
        tokenAuth:
            type: apiKey
            in: header
            name: token
            description: 用户登录后返回的身份令牌

    schemas:
        Result:
            type: object
            description: 统一返回结果格式
            properties:
                code:
                    type: integer
                    description: 响应码（1成功 / 0失败）
                    example: 1
                msg:
                    type: string
                    description: 响应提示信息
                    example: 操作成功
                data:
                    type: object
                    description: 响应数据体（按需返回）
                    example: {}
            required:
                - code

        UserLoginDTO:
            type: object
            description: 学生登录请求参数
            properties:
                username:
                    type: string
                    description: 学生用户名
                    example: "student001"
                password:
                    type: string
                    description: 学生密码
                    example: "123456"
            required: [username, password]

        AdminLoginDTO:
            type: object
            description: 管理员登录请求参数
            properties:
                username:
                    type: string
                    description: 管理员用户名
                    example: "admin001"
                password:
                    type: string
                    description: 管理员密码
                    example: "admin123"
            required: [username, password]

        UserQueryDTO:
            type: object
            description: 用户查询条件
            properties:
                username:
                    type: string
                    description: 用户名（模糊查询）
                    example: "student"
                name:
                    type: string
                    description: 姓名（模糊查询）
                    example: "张"
                phone:
                    type: string
                    description: 手机号（模糊查询）
                    example: "138"
                pageNum:
                    type: integer
                    description: 页码
                    example: 1
                pageSize:
                    type: integer
                    description: 每页数量
                    example: 10

        UserRegisterDTO:
            type: object
            description: 学生注册请求参数
            properties:
                username:
                    type: string
                    description: 注册用户名
                    example: "student002"
                password:
                    type: string
                    description: 注册密码
                    example: "123456"
                name:
                    type: string
                    description: 学生真实姓名
                    example: "张三"
                phone:
                    type: string
                    description: 手机号（选填）
                    example: "13800138000"
            required: [username, password, name]

        UserUpdateInfoDTO:
            type: object
            description: 学生修改个人资料参数
            properties:
                name:
                    type: string
                    description: 学生真实姓名
                    example: "张三三"
                phone:
                    type: string
                    description: 手机号
                    example: "13900139000"
            required: [name]

        UserUpdatePwdDTO:
            type: object
            description: 学生修改密码参数
            properties:
                oldPwd:
                    type: string
                    description: 原密码
                    example: "123456"
                newPwd:
                    type: string
                    description: 新密码
                    example: "654321"
            required: [oldPwd, newPwd]

        ReservationQueryDTO:
            type: object
            description: 预约查询条件
            properties:
                reserveDate:
                    type: string
                    format: date
                    description: 预约日期
                    example: "2024-05-20"
                status:
                    type: string
                    description: 预约状态（未开始/进行中/已结束/已取消）
                    example: "未开始"
                pageNum:
                    type: integer
                    description: 页码
                    example: 1
                pageSize:
                    type: integer
                    description: 每页数量
                    example: 10

        RoomAddDTO:
            type: object
            description: 管理员添加自习室参数
            properties:
                roomId:
                    type: string
                    description: 自习室编号
                    example: "4401"
                roomName:
                    type: string
                    description: 自习室名称
                    example: "第一教学楼101室"
                location:
                    type: string
                    description: 自习室位置
                    example: "第一教学楼1层"
                totalSeats:
                    type: integer
                    description: 总座位数
                    example: 50
                openTime:
                    type: string
                    format: time
                    description: 开放时间
                    example: "08:00:00"
                closeTime:
                    type: string
                    format: time
                    description: 关闭时间
                    example: "22:00:00"
            required:
                - roomId
                - roomName
                - location
                - totalSeats
                - openTime
                - closeTime

        SeatAddDTO:
            type: object
            description: 管理员为自习室添加座位参数
            properties:
                roomId:
                    type: string
                    description: 自习室编号
                    example: "4401"
            required: [roomId]

        RoomQueryDTO:
            type: object
            description: 自习室查询条件
            properties:
                roomName:
                    type: string
                    description: 自习室名称（模糊查询）
                    example: "101"
                location:
                    type: string
                    description: 自习室位置（模糊查询）
                    example: "第一教学楼"
                pageNum:
                    type: integer
                    description: 页码
                    example: 1
                pageSize:
                    type: integer
                    description: 每页数量
                    example: 10

        ReservationAddDTO:
            type: object
            description: 学生预约座位参数
            properties:
                roomId:
                    type: string
                    description: 自习室编号
                    example: "4401"
                seatId:
                    type: string
                    description: 座位编号（如4401_01）
                    example: "4401_01"
                reserveDate:
                    type: string
                    format: date
                    description: 预约日期
                    example: "2024-05-20"
                startTime:
                    type: string
                    format: time
                    description: 预约开始时间
                    example: "09:00:00"
                endTime:
                    type: string
                    format: time
                    description: 预约结束时间
                    example: "11:00:00"
            required: [roomId, seatId, reserveDate, startTime, endTime]

        NoticeAddDTO:
            type: object
            description: 管理员发布公告参数
            properties:
                title:
                    type: string
                    description: 公告标题
                    example: "五一自习室开放调整通知"
                content:
                    type: string
                    description: 公告内容
                    example: "五一期间（5.1-5.3）自习室开放时间为09:00-20:00，望周知。"
            required: [title, content]

        NoticeQueryDTO:
            type: object
            description: 公告查询条件
            properties:
                title:
                    type: string
                    description: 公告标题（模糊查询）
                    example: "五一"
                pageNum:
                    type: integer
                    description: 页码
                    example: 1
                pageSize:
                    type: integer
                    description: 每页数量
                    example: 10

paths:
    /login/user:
        post:
            summary: 学生登录
            tags: [1. 登录模块]
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/UserLoginDTO"
            responses:
                "200":
                    description: 成功
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Result"

    /login/admin:
        post:
            summary: 管理员登录
            tags: [1. 登录模块]
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/AdminLoginDTO"
            responses:
                "200":
                    description: 成功
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Result"

    /logout:
        post:
            summary: 退出登录
            tags: [1. 登录模块]
            security:
                - tokenAuth: []
            responses:
                "200":
                    description: 成功
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Result"

    /user/register:
        post:
            summary: 用户注册
            tags: [2. 学生用户专用]
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/UserRegisterDTO"
            responses:
                "200":
                    description: 成功
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Result"

    /user/info:
        get:
            summary: 获取当前用户信息
            tags: [2. 学生用户专用]
            security:
                - tokenAuth: []
            responses:
                "200":
                    description: 成功
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Result"

    /user/update/info:
        post:
            summary: 修改个人资料
            tags: [2. 学生用户专用]
            security:
                - tokenAuth: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/UserUpdateInfoDTO"
            responses:
                "200":
                    description: 成功
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Result"

    /user/update/pwd:
        post:
            summary: 修改密码
            tags: [2. 学生用户专用]
            security:
                - tokenAuth: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/UserUpdatePwdDTO"
            responses:
                "200":
                    description: 成功
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Result"

    /reservation/add:
        post:
            summary: 预约座位
            tags: [2. 学生用户专用]
            security:
                - tokenAuth: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/ReservationAddDTO"
            responses:
                "200":
                    description: 预约成功
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Result"

    /reservation/my:
        get:
            summary: 我的预约
            tags: [2. 学生用户专用]
            security:
                - tokenAuth: []
            parameters:
                - name: reserveDate
                  in: query
                  required: false
                  schema:
                      type: string
                      format: date
                - name: status
                  in: query
                  required: false
                  schema:
                      type: string
                - name: pageNum
                  in: query
                  required: false
                  schema:
                      type: integer
                - name: pageSize
                  in: query
                  required: false
                  schema:
                      type: integer
            responses:
                "200":
                    description: 成功
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Result"

    /reservation/cancel/{id}:
        post:
            summary: 取消我的预约
            tags: [2. 学生用户专用]
            security:
                - tokenAuth: []
            parameters:
                - name: id
                  in: path
                  required: true
                  schema:
                      type: integer
            responses:
                "200":
                    description: 成功
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Result"

    /admin/user/list:
        get:
            summary: 查看所有用户
            tags: [3. 管理员专用]
            security:
                - tokenAuth: []
            parameters:
                - name: username
                  in: query
                  required: false
                  schema:
                      type: string
                - name: name
                  in: query
                  required: false
                  schema:
                      type: string
                - name: phone
                  in: query
                  required: false
                  schema:
                      type: string
                - name: pageNum
                  in: query
                  required: false
                  schema:
                      type: integer
                - name: pageSize
                  in: query
                  required: false
                  schema:
                      type: integer
            responses:
                "200":
                    description: 成功
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Result"

    /admin/room/add:
        post:
            summary: 添加自习室
            tags: [3. 管理员专用]
            security:
                - tokenAuth: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/RoomAddDTO"
            responses:
                "200":
                    description: 成功
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Result"

    /admin/room/delete/{roomId}:
        post:
            summary: 删除自习室
            tags: [3. 管理员专用]
            security:
                - tokenAuth: []
            parameters:
                - name: roomId
                  in: path
                  required: true
                  schema:
                      type: string
            responses:
                "200":
                    description: 成功
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Result"

    /admin/seat/add:
        post:
            summary: 添加座位
            tags: [3. 管理员专用]
            security:
                - tokenAuth: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/SeatAddDTO"
            responses:
                "200":
                    description: 成功
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Result"

    /admin/seat/delete/{seatId}:
        post:
            summary: 删除座位
            tags: [3. 管理员专用]
            security:
                - tokenAuth: []
            parameters:
                - name: seatId
                  in: path
                  required: true
                  description: 座位编号（如4401_01）
                  schema:
                      type: string
                      example: "4401_01"
            responses:
                "200":
                    description: 删除成功
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Result"

    /admin/reservation/list:
        get:
            summary: 查看全部预约
            tags: [3. 管理员专用]
            security:
                - tokenAuth: []
            parameters:
                - name: username
                  in: query
                  required: false
                  schema:
                      type: string
                - name: reserveDate
                  in: query
                  required: false
                  schema:
                      type: string
                      format: date
                - name: status
                  in: query
                  required: false
                  schema:
                      type: string
                - name: pageNum
                  in: query
                  required: false
                  schema:
                      type: integer
                - name: pageSize
                  in: query
                  required: false
                  schema:
                      type: integer
            responses:
                "200":
                    description: 成功
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Result"

    /admin/reservation/forceCancel/{id}:
        post:
            summary: 强制取消预约
            tags: [3. 管理员专用]
            security:
                - tokenAuth: []
            parameters:
                - name: id
                  in: path
                  required: true
                  schema:
                      type: integer
            responses:
                "200":
                    description: 成功
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Result"

    /admin/notice/add:
        post:
            summary: 发布公告
            tags: [3. 管理员专用]
            security:
                - tokenAuth: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/NoticeAddDTO"
            responses:
                "200":
                    description: 成功
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Result"

    /admin/notice/delete/{id}:
        post:
            summary: 删除公告
            tags: [3. 管理员专用]
            security:
                - tokenAuth: []
            parameters:
                - name: id
                  in: path
                  required: true
                  schema:
                      type: integer
            responses:
                "200":
                    description: 成功
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Result"

    /room/list:
        get:
            summary: 自习室列表
            tags: [4. 公共开放模块]
            parameters:
                - name: roomName
                  in: query
                  required: false
                  schema:
                      type: string
                - name: location
                  in: query
                  required: false
                  schema:
                      type: string
                - name: pageNum
                  in: query
                  required: false
                  schema:
                      type: integer
                - name: pageSize
                  in: query
                  required: false
                  schema:
                      type: integer
            responses:
                "200":
                    description: 成功
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Result"

    /room/detail/{roomId}:
        get:
            summary: 自习室详情
            tags: [4. 公共开放模块]
            parameters:
                - name: roomId
                  in: path
                  required: true
                  schema:
                      type: string
            responses:
                "200":
                    description: 成功
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Result"

    /seat/list/{roomId}:
        get:
            summary: 查看座位
            tags: [4. 公共开放模块]
            parameters:
                - name: roomId
                  in: path
                  required: true
                  schema:
                      type: string
                      example: "4401"
            responses:
                "200":
                    description: 获取成功
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Result"
                            example:
                                code: 1
                                msg: 获取成功
                                data:
                                    list:
                                        - seatId: "4401_01"
                                          status: "空闲"
                                        - seatId: "4401_02"
                                          status: "已预约"

    /notice/list:
        get:
            summary: 公告列表
            tags: [4. 公共开放模块]
            parameters:
                - name: title
                  in: query
                  required: false
                  schema:
                      type: string
                - name: pageNum
                  in: query
                  required: false
                  schema:
                      type: integer
                - name: pageSize
                  in: query
                  required: false
                  schema:
                      type: integer
            responses:
                "200":
                    description: 成功
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Result"
